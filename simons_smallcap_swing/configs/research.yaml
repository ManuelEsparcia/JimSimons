research:
  objective: robust_oos_edge
  target_cagr: 0.30

experiment_tracking:
  platform: mlflow
  require_run_id: true
  require_config_hash: true
  require_code_hash: true

alpha_discovery:
  brute_force_enabled: true
  max_candidates_per_batch: 500
  min_ic_abs: 0.02
  min_ic_stability_ratio: 0.55

ablation:
  feature_ablation_required: true
  model_ablation_required: true

multiple_testing:
  control_method: reality_check
  fdr_alpha: 0.10

pbo:
  method: cscv
  max_pbo: 0.20

capacity_analysis:
  enabled: true
  capital_grid_usd: [1000000, 5000000, 10000000, 25000000]

promotion:
  require_all_validation_gates_pass: true
  states: [PROMOTE_TO_PAPER, HOLD_FOR_RESEARCH, REJECT]

governance:
  hypothesis_template_required: true
  peer_review_required: true
  reproducibility_check_required: true
