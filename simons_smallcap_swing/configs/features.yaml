feature_store:
  version: v1
  output_table: features.daily_matrix

families:
  fundamentals_core: true
  fundamentals_deltas: true
  microstructure: true
  cross_sectional: true
  interactions: true

fundamentals:
  winsorize_pct: 0.01
  use_ttm_fields: true
  min_history_quarters: 6

microstructure:
  atr_window: 14
  adv_window: 20
  amihud_window: 20
  turnover_window: 20

cross_sectional:
  neutralize_by: [sector, size_bucket]
  transform: robust_zscore
  rank_to_uniform: true

interactions:
  max_interactions_per_family: 50
  interaction_selection_metric: ic_stability

missing_data:
  imputation: cross_sectional_median
  max_feature_null_ratio: 0.25
  drop_feature_if_null_ratio_above: 0.40

drift:
  psi_warn_threshold: 0.20
  psi_fail_threshold: 0.30

qc:
  fail_on_inf_values: true
  fail_on_leakage_features: true
  max_outlier_zscore: 8.0
