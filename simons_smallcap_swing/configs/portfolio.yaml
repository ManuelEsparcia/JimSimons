portfolio:
  mode: long_short
  rebalance_frequency: weekly
  holding_period_days: [5, 20]

construction:
  long_quantile: 0.90
  short_quantile: 0.10
  target_names_per_side: 50

risk_targets:
  annual_vol_target: 0.18
  beta_target: 0.00
  beta_tolerance: 0.10
  sector_neutral_tolerance: 0.05

constraints:
  max_weight_per_name: 0.03
  max_weight_per_sector: 0.20
  max_gross_exposure: 1.60
  max_net_exposure_abs: 0.20
  max_turnover_daily: 0.30
  max_participation_adv: 0.02

sizing:
  method: volatility_targeted
  atr_window: 14
  min_position_notional_usd: 5000

capacity:
  test_capital_levels_usd: [1000000, 5000000, 10000000]
  min_net_sharpe_at_mid_capital: 1.0
