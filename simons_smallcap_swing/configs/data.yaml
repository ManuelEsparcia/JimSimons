project:
  data_root: data
  cache_root: cache
  artifacts_root: artifacts

sources:
  prices:
    provider: placeholder_prices_provider
    frequency: daily
    adjusted: true
  edgar:
    provider: sec_edgar
    submissions_endpoint: true
    companyfacts_endpoint: true
  market_proxies:
    tickers: [SPY, IWM, XLF, XLK, XLE, XLV, XLI, XLY, XLP, XLB, XLU, XLRE]

reference_tables:
  trading_calendar: data/reference/trading_calendar.parquet
  sector_industry_map: data/reference/sector_industry_map.parquet
  ticker_history_map: data/reference/ticker_history_map.parquet
  symbols_metadata: data/reference/symbols_metadata.parquet

ingestion:
  start_date: 2005-01-01
  end_date: null
  incremental_mode: true
  retry_attempts: 3
  retry_backoff_seconds: 10

point_in_time:
  enforce_asof_join: true
  max_filing_lag_days: 180
  timezone: UTC

storage:
  format: parquet
  compression: zstd
  partition_by: [date]

qc:
  fail_on_future_timestamps: true
  fail_on_duplicate_primary_keys: true
  fail_on_schema_mismatch: true
  max_null_ratio_default: 0.15
