project:
  name: simons_smallcap_swing
  region: US
  timezone: America/New_York
  currency: USD

universe:
  benchmark_proxy: IWM
  include_exchanges: [NYSE, NASDAQ, AMEX]
  security_types: [COMMON_STOCK]
  rebalance_frequency: monthly

filters:
  min_price_usd: 2.0
  max_price_usd: 250.0
  min_adv20_usd: 1000000
  min_free_float_mcap_usd: 100000000
  exclude_etf_etn_adr: true
  exclude_recent_ipos_days: 120
  exclude_penny_stocks: true

liquidity_caps:
  max_participation_adv: 0.02
  min_trade_notional_usd: 5000

corporate_actions:
  apply_splits: true
  apply_reverse_splits: true
  track_ticker_changes: true

survivorship:
  include_delisted: true
  require_perm_id_history: true

qc:
  max_missing_days_per_symbol: 20
  max_duplicate_rows: 0
  hard_fail_on_symbol_mapping_break: true
