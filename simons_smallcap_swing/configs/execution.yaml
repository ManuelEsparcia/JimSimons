costs:
  commissions_bps: 1.0
  fees_bps: 0.5
  spread_bps_base: 5.0

impact:
  model: square_root
  coefficient: 12.0
  volatility_lookback_days: 20
  adv_lookback_days: 20

fills:
  simulator: vwap_proxy
  allow_open_fill: true
  allow_close_fill: true

borrow:
  enabled: true
  default_borrow_bps_day: 3.0
  hard_to_borrow_bps_day: 15.0
  locate_required_for_shorts: true

turnover_control:
  enabled: true
  max_daily_turnover: 0.30
  penalty_lambda: 0.10

stress:
  cost_upside_scenarios: [1.25, 1.50]
  impact_upside_scenarios: [1.25, 1.50]
