baselines:
  ridge:
    enabled: true
    alpha_grid: [0.1, 1.0, 10.0]
  elasticnet:
    enabled: true
    alpha_grid: [0.001, 0.01, 0.1]
    l1_ratio_grid: [0.1, 0.5, 0.9]
  logistic:
    enabled: true
    c_grid: [0.1, 1.0, 10.0]

gbdt:
  lgbm:
    enabled: true
    num_leaves: [31, 63]
    learning_rate: [0.03, 0.05]
    n_estimators: [300, 600]
  xgb:
    enabled: true
    max_depth: [4, 6]
    eta: [0.03, 0.05]
    n_estimators: [300, 600]

calibration:
  enabled: true
  method: isotonic

regimes:
  enabled: true
  gating_method: volatility_trend
  hmm_optional: true

ensemble:
  blender_enabled: true
  stacking_enabled: true
  min_model_diversity_corr: 0.70

training:
  random_seed: 42
  retrain_frequency: monthly
  min_train_years: 5
  validation_method: purged_walkforward

registry:
  enabled: true
  require_model_hash: true
  require_data_snapshot_id: true
