engine:
  frequency: daily
  accounting_mode: strict
  include_borrow_costs: true
  include_dividends: true

walkforward:
  train_years: 5
  test_months: 3
  step_months: 1
  expanding_window: true

validation_windows:
  min_oos_blocks: 12

metrics:
  required: [cagr, sharpe, calmar, max_drawdown, turnover, hit_ratio]

gates:
  sharpe_net_min: 1.2
  calmar_min: 0.9
  max_drawdown_max: 0.20
  oos_positive_blocks_min_ratio: 0.65
  pbo_max: 0.20

stress_tests:
  enable_synthetic_shocks: true
  shock_levels_sigma: [1, 2, 3]

reporting:
  save_daily_pnl: true
  save_attribution: true
  save_diagnostics: true
